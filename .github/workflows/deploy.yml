name: Deploy AuraGarcia Webpage

on:
  push:
    branches:
      - main
  # Permite lanzar el deploy manualmente desde la pestaña Actions,
  # eligiendo protocolo sin necesidad de hacer push.
  workflow_dispatch:
    inputs:
      protocol:
        description: 'Protocolo de despliegue'
        required: true
        default: 'ftps'
        type: choice
        options:
          - ftps
          - ftp
          - sftp

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: webpage_prod
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Diagnóstico: qué puertos acepta el servidor.
      # 21 abierto  -> FTP/FTPS explícito
      # 990 abierto -> FTPS implícito
      # 22 abierto  -> SFTP (requiere protocolo sftp)
      # GitHub enmascara el valor del secret en los logs.
      - name: Diagnóstico de conexión
        continue-on-error: true
        run: |
          for port in 21 990 22; do
            if timeout 8 bash -c "</dev/tcp/${{ secrets.FTP_SERVER }}/$port" 2>/dev/null; then
              echo "✅ Puerto $port ABIERTO"
            else
              echo "❌ Puerto $port cerrado o sin respuesta"
            fi
          done
          echo "Si solo el 22 está abierto, relanza este workflow (Run workflow) con protocolo 'sftp'."

      # FTPS (por defecto) o FTP plano — puerto 21
      - name: Despliegue por FTP/FTPS
        if: ${{ github.event_name == 'push' || inputs.protocol != 'sftp' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ github.event_name == 'push' && 'ftps' || inputs.protocol }}
          local-dir: ./
          server-dir: /public_html/
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            vendor/**
            preview*.html

      # SFTP (puerto 22) — se usa al lanzar manualmente con protocolo 'sftp'
      - name: Despliegue por SFTP
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.protocol == 'sftp' }}
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          sftp_only: true
          local_path: './*'
          remote_path: /public_html
