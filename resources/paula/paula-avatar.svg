<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" fill="none" role="img" aria-label="Paula, aura de energía de AuraGarcia">
  <defs>
    <radialGradient id="orbCore" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#FDF2FF"/>
      <stop offset="22%" stop-color="#F5C2F7"/>
      <stop offset="48%" stop-color="#B79BF5"/>
      <stop offset="74%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B2C9E"/>
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobViolet" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E879F9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E879F9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0ABFC"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="sheen" cx="40%" cy="32%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bBig" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="bMed" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="bSoft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    <clipPath id="coreClip"><circle cx="400" cy="400" r="190"/></clipPath>

    <style>
      :root { }
      .vbox { transform-box: view-box; transform-origin: 400px 400px; }
      .breathe { animation: breathe 7s ease-in-out infinite; }
      .breatheSlow { animation: breathe 11s ease-in-out infinite; }
      .breatheGlow { animation: breatheGlow 6s ease-in-out infinite; }
      .spin { animation: spin 40s linear infinite; }
      .spinRev { animation: spin 55s linear infinite reverse; }
      .spinOrbit { animation: spin 26s linear infinite; }
      .spinOrbit2 { animation: spin 34s linear infinite reverse; }
      .d1 { animation: drift1 9s ease-in-out infinite; }
      .d2 { animation: drift2 11s ease-in-out infinite; }
      .d3 { animation: drift3 13s ease-in-out infinite; }
      .d4 { animation: drift4 10s ease-in-out infinite; }
      .tw { animation: twinkle 4s ease-in-out infinite; }
      @keyframes breathe {
        0%,100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      @keyframes breatheGlow {
        0%,100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.12); opacity: 1; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes drift1 {
        0%,100% { transform: translate(0px,0px); }
        50% { transform: translate(46px,-34px); }
      }
      @keyframes drift2 {
        0%,100% { transform: translate(0px,0px); }
        50% { transform: translate(-52px,30px); }
      }
      @keyframes drift3 {
        0%,100% { transform: translate(0px,0px); }
        50% { transform: translate(30px,48px); }
      }
      @keyframes drift4 {
        0%,100% { transform: translate(0px,0px); }
        50% { transform: translate(-36px,-44px); }
      }
      @keyframes twinkle {
        0%,100% { opacity: 0.25; }
        50% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .breathe,.breatheSlow,.breatheGlow,.spin,.spinRev,.spinOrbit,.spinOrbit2,.d1,.d2,.d3,.d4,.tw { animation: none; }
      }
    </style>
  </defs>

  <!-- Outer aura glow -->
  <g class="vbox breatheGlow">
    <circle cx="400" cy="400" r="330" fill="url(#orbGlow)"/>
  </g>
  <g class="vbox breatheSlow">
    <circle cx="400" cy="400" r="260" fill="url(#orbGlow)" opacity="0.6"/>
  </g>

  <!-- Orbiting rings -->
  <g class="vbox spin" opacity="0.45">
    <circle cx="400" cy="400" r="300" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="2 14"/>
  </g>
  <g class="vbox spinRev" opacity="0.4">
    <ellipse cx="400" cy="400" rx="246" ry="284" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="1 18"/>
  </g>
  <g class="vbox spin" opacity="0.5">
    <ellipse cx="400" cy="400" rx="290" ry="230" fill="none" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="1 22"/>
  </g>

  <!-- The breathing orb -->
  <g class="vbox breathe">
    <!-- base sphere -->
    <circle cx="400" cy="400" r="190" fill="url(#orbCore)"/>

    <!-- fluid inner plasma (clipped) -->
    <g clip-path="url(#coreClip)">
      <g class="vbox spinOrbit">
        <g class="d1"><circle cx="350" cy="330" r="150" fill="url(#blobMagenta)" filter="url(#bBig)"/></g>
        <g class="d3"><circle cx="470" cy="450" r="160" fill="url(#blobBlue)" filter="url(#bBig)"/></g>
      </g>
      <g class="vbox spinOrbit2">
        <g class="d2"><circle cx="330" cy="470" r="150" fill="url(#blobViolet)" filter="url(#bBig)"/></g>
        <g class="d4"><circle cx="460" cy="320" r="140" fill="url(#blobPink)" filter="url(#bBig)"/></g>
      </g>
      <!-- soft core highlight -->
      <circle cx="358" cy="338" r="120" fill="url(#sheen)" filter="url(#bMed)"/>
    </g>

    <!-- rim light -->
    <circle cx="400" cy="400" r="189" fill="none" stroke="#F5D0FE" stroke-width="1.5" opacity="0.5"/>
    <circle cx="400" cy="400" r="190" fill="none" stroke="#1E1B4B" stroke-width="2" opacity="0.18"/>
    <!-- top sheen -->
    <ellipse cx="360" cy="320" rx="92" ry="58" fill="url(#sheen)" opacity="0.55" filter="url(#bSoft)"/>
  </g>

  <!-- Orbiting energy particles -->
  <g class="vbox spinOrbit">
    <circle cx="400" cy="92" r="6" fill="#F0ABFC" class="tw" filter="url(#bSoft)"/>
    <circle cx="708" cy="400" r="4" fill="#A78BFA" class="tw"/>
  </g>
  <g class="vbox spinOrbit2">
    <circle cx="400" cy="700" r="5" fill="#60A5FA" class="tw" filter="url(#bSoft)"/>
    <circle cx="118" cy="360" r="4.5" fill="#E879F9" class="tw"/>
    <circle cx="610" cy="170" r="3.5" fill="#C4B5FD" class="tw"/>
  </g>
</svg>
