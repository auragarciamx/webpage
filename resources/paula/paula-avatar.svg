<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 820" width="760" height="820" fill="none" role="img" aria-label="Paula, el agente de IA de AuraGarcia">
  <defs>
    <radialGradient id="paulaAura" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#6366F1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paulaSkin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF0FF"/>
      <stop offset="55%" stop-color="#C7CBFF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="paulaHair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="paulaHairLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="paulaCollar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Aura background glow -->
  <circle cx="380" cy="360" r="360" fill="url(#paulaAura)"/>

  <!-- Orbiting halo ring -->
  <g opacity="0.65">
    <ellipse cx="380" cy="372" rx="300" ry="300" stroke="url(#ringGrad)" stroke-width="1.5" stroke-dasharray="2 10" opacity="0.5"/>
    <circle cx="380" cy="372" r="250" stroke="url(#ringGrad)" stroke-width="2" opacity="0.35"/>
  </g>

  <!-- Bust / shoulders -->
  <path d="M150 820 C150 660 250 600 380 600 C510 600 610 660 610 820 Z" fill="url(#paulaCollar)"/>
  <path d="M380 600 C300 600 240 628 205 686 C260 648 320 636 380 636 C440 636 500 648 555 686 C520 628 460 600 380 600 Z" fill="#4338CA" opacity="0.5"/>
  <!-- Neck -->
  <path d="M338 540 L338 600 C338 624 422 624 422 600 L422 540 Z" fill="url(#paulaSkin)"/>
  <path d="M338 562 C360 588 400 588 422 562 L422 540 L338 540 Z" fill="#9F8BE8" opacity="0.4"/>

  <!-- Hair back -->
  <path d="M210 360 C210 210 290 120 380 120 C470 120 550 210 550 360 C550 470 540 560 520 620 C520 540 510 470 500 430 C500 470 498 540 484 600 C470 520 466 470 460 440 L300 440 C294 470 290 520 276 600 C262 540 260 470 260 430 C250 470 240 540 240 620 C220 560 210 470 210 360 Z" fill="url(#paulaHair)"/>

  <!-- Face -->
  <path d="M285 330 C285 248 327 196 380 196 C433 196 475 248 475 330 C475 412 433 470 380 470 C327 470 285 412 285 330 Z" fill="url(#paulaSkin)"/>
  <!-- Cheek shading -->
  <path d="M300 350 C300 300 320 360 360 380 C320 400 300 400 300 350 Z" fill="#B7A6F0" opacity="0.35"/>
  <path d="M460 350 C460 300 440 360 400 380 C440 400 460 400 460 350 Z" fill="#B7A6F0" opacity="0.35"/>

  <!-- Eyes -->
  <g>
    <ellipse cx="340" cy="338" rx="16" ry="11" fill="#1E1B4B"/>
    <ellipse cx="420" cy="338" rx="16" ry="11" fill="#1E1B4B"/>
    <circle cx="345" cy="334" r="3.4" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="425" cy="334" r="3.4" fill="#FFFFFF" opacity="0.9"/>
    <!-- Brows -->
    <path d="M320 312 C332 304 352 304 362 310" stroke="#4338CA" stroke-width="4" stroke-linecap="round"/>
    <path d="M398 310 C408 304 428 304 440 312" stroke="#4338CA" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Nose -->
  <path d="M380 350 L373 384 C373 392 387 392 387 384 Z" fill="#B7A6F0" opacity="0.45"/>

  <!-- Smile -->
  <path d="M352 410 C368 426 392 426 408 410" stroke="#6D28D9" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M360 416 C372 424 388 424 400 416" stroke="#C4B5FD" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Hair front fringe -->
  <path d="M270 320 C262 220 320 150 380 150 C440 150 498 220 490 320 C470 268 446 240 410 232 C430 256 436 286 432 312 C414 268 398 252 380 250 C362 252 346 268 328 312 C324 286 330 256 350 232 C314 240 290 268 270 320 Z" fill="url(#paulaHairLight)"/>

  <!-- Headset / earpiece (AI agent cue) -->
  <g stroke="url(#ringGrad)" stroke-width="6" fill="none" opacity="0.95">
    <path d="M268 330 C262 360 268 392 282 410"/>
  </g>
  <circle cx="284" cy="408" r="11" fill="#A78BFA"/>
  <circle cx="284" cy="408" r="4" fill="#1E1B4B"/>
  <path d="M295 408 C330 432 360 436 380 436" stroke="url(#ringGrad)" stroke-width="4" fill="none" opacity="0.8"/>
  <circle cx="380" cy="436" r="6" fill="#60A5FA"/>

  <!-- Floating integration chips around Paula -->
  <!-- WhatsApp -->
  <g transform="translate(96,250)">
    <circle r="40" fill="url(#chipGrad)" stroke="#22C55E" stroke-width="1.5"/>
    <path d="M-15 15 L-11 4 A16 16 0 1 1 -3 12 Z" fill="#25D366"/>
    <path d="M-6.5 -6 c-0.6 -1.3 -1.2 -1.3 -1.8 -1.3 c-0.6 0 -1.2 0.1 -1.8 0.8 c-0.6 0.6 -2.3 2.2 -2.3 5.4 c0 3.2 2.3 6.3 2.7 6.7 c0.3 0.4 4.6 7 11 9.5 c5.3 2 6.4 1.6 7.6 1.5 c1.2 -0.1 3.7 -1.5 4.2 -3 c0.5 -1.5 0.5 -2.7 0.4 -3 c-0.2 -0.3 -0.6 -0.4 -1.2 -0.7 c-0.6 -0.3 -3.7 -1.8 -4.2 -2 c-0.6 -0.2 -1 -0.3 -1.4 0.3 c-0.4 0.6 -1.6 2 -1.9 2.4 c-0.4 0.4 -0.7 0.4 -1.3 0.1 c-0.6 -0.3 -2.6 -1 -5 -3.1 c-1.8 -1.6 -3.1 -3.6 -3.4 -4.2 c-0.4 -0.6 0 -0.9 0.3 -1.2 c0.3 -0.3 0.6 -0.7 0.9 -1.1 c0.3 -0.4 0.4 -0.6 0.6 -1 c0.2 -0.4 0.1 -0.8 0 -1.1 c-0.2 -0.3 -1.3 -3.4 -1.9 -4.6 z" fill="#FFFFFF"/>
  </g>
  <!-- Telegram -->
  <g transform="translate(120,470)">
    <circle r="36" fill="url(#chipGrad)" stroke="#3B82F6" stroke-width="1.5"/>
    <path d="M-17 -4 L17 -15 L11 17 L2 8 L-4 13 L-5 4 Z" fill="#29A9EB"/>
    <path d="M-5 4 L13 -10 L-1 6 Z" fill="#FFFFFF" opacity="0.85"/>
  </g>
  <!-- Slack -->
  <g transform="translate(640,260)">
    <circle r="38" fill="url(#chipGrad)" stroke="#8B5CF6" stroke-width="1.5"/>
    <g transform="translate(-13,-13) scale(1.1)">
      <rect x="9" y="2" width="5" height="13" rx="2.5" fill="#E01E5A"/>
      <rect x="2" y="9" width="13" height="5" rx="2.5" fill="#36C5F0"/>
      <rect x="10" y="9" width="5" height="13" rx="2.5" fill="#2EB67D"/>
      <rect x="9" y="10" width="13" height="5" rx="2.5" fill="#ECB22E"/>
    </g>
  </g>
  <!-- Model chip "AI" -->
  <g transform="translate(632,478)">
    <circle r="36" fill="url(#chipGrad)" stroke="#60A5FA" stroke-width="1.5"/>
    <path d="M0 -18 L16 9 L-16 9 Z" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <circle r="5" fill="#60A5FA"/>
    <circle cx="-13" cy="11" r="4" fill="#A78BFA"/>
    <circle cx="13" cy="11" r="4" fill="#34D399"/>
  </g>

  <!-- Chat bubble: "Hola, soy Paula" -->
  <g transform="translate(470,150)">
    <rect x="0" y="0" width="218" height="66" rx="20" fill="#FFFFFF"/>
    <path d="M22 66 L22 86 L48 66 Z" fill="#FFFFFF"/>
    <circle cx="34" cy="33" r="14" fill="url(#ringGrad)"/>
    <text x="34" y="38" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">P</text>
    <text x="60" y="29" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1E1B4B">Hola, soy Paula</text>
    <text x="60" y="49" font-family="Arial, sans-serif" font-size="12" fill="#6366F1">¿En qué te ayudo hoy?</text>
  </g>

  <!-- subtle grain over everything -->
  <rect width="760" height="820" filter="url(#grain)" opacity="0.4"/>
</svg>
